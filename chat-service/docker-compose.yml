services:
  postgres-db:
    image: postgres:16-alpine
    ports: ["5432:5432"]
    environment:
      POSTGRES_DB: chatdb
      POSTGRES_USER: chatuser
      POSTGRES_PASSWORD: chatpass
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatuser"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports: ["8000:8000"]
    environment:
      DATABASE_URL: postgresql+psycopg_async://chatuser:chatpass@postgres-db:5432/chatdb
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      CORS_ORIGINS: '["http://localhost:3000"]'
    depends_on:
      postgres-db: { condition: service_healthy }
    env_file: [.env]

volumes:
  pgdata:
